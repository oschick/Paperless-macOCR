services:
  paperless-macocr:
    # Alternatively, use a pre-built image:
    image: ghcr.io/oschick/paperless-macocr:main
    container_name: paperless-macocr
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      PAPERLESS_URL: "http://paperless-ngx:8000"
      PAPERLESS_TOKEN: "${PAPERLESS_TOKEN}"
      # OCR backend: macOCR (port 8080) or iOS-OCR-Server (port 8000)
      MACOCR_URL: "http://host.docker.internal:8080"
      MACOCR_AUTH: ""
      WEBHOOK_SECRET: ""
      LOG_LEVEL: "INFO"
      OCR_DPI: "300"
      SKIP_IF_TEXT_PRESENT: "true"
      REPLACE_PDF: "false"
      # Comma-separated tag names or IDs to strip from the replacement document
      REPLACE_PDF_REMOVE_TAGS: ""
      # ── Web UI ────────────────────────────────────────────────────
      WEB_UI_ENABLED: "true"
      # Auth mode: none | basic | oidc
      WEB_UI_AUTH: "none"
      # Basic auth (when WEB_UI_AUTH=basic)
      WEB_UI_USERNAME: "admin"
      WEB_UI_PASSWORD: ""
      # Session signing secret — change this in production
      SESSION_SECRET: "${SESSION_SECRET:-change-me-in-production}"
      # Comma-separated tag IDs to hide from the document list
      WEB_UI_EXCLUDE_TAGS: ""
      # ── OIDC (when WEB_UI_AUTH=oidc) ──────────────────────────────
      OIDC_CLIENT_ID: ""
      OIDC_CLIENT_SECRET: ""
      OIDC_DISCOVERY_URL: ""
      OIDC_REDIRECT_URI: ""
    # If Paperless-NGX is running in Docker on the same network:
    # networks:
    #   - paperless
    extra_hosts:
      - "host.docker.internal:host-gateway"

# networks:
#   paperless:
#     external: true
